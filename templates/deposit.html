{% extends "base.html" %}
{% block page_title %}Deposit{% endblock %}
{% block content %}

<div class="card p-4 shadow-sm">
  <h3 class="mb-3">Deposit Money</h3>

  <form method="POST" action="{{ url_for('bank.deposit') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="idempotency_key" value="{{ idempotency_key }}">

    <div class="mb-3">
      <label class="form-label">Amount</label>
      <input class="form-control" type="number" step="0.01" min="0.01" name="amount" required>
    </div>

    <button class="btn btn-success" type="submit">Deposit</button>
  </form>
</div>

{% endblock %}
