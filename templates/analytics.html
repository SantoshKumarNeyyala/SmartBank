{% extends "base.html" %}
{% block page_title %}Analytics{% endblock %}
{% block content %}

<div class="card p-4 shadow-sm mb-3">
  <h3 class="mb-1">Analytics</h3>
  <p class="text-muted mb-0">Last 7 days (Selected account)</p>
</div>

<div class="card p-4 shadow-sm">
  <canvas id="txnChart" height="90"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function () {
  const res = await fetch("{{ url_for('bank.api_analytics_last7days') }}");
  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  const ctx = document.getElementById("txnChart");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: data.labels,
      datasets: [
        { label: "Deposits", data: data.deposits, tension: 0.3 },
        { label: "Withdraws", data: data.withdraws, tension: 0.3 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true }
      }
    }
  });
})();
</script>

{% endblock %}
