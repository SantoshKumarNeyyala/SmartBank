{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow-sm">
  <h3>Admin Audit Logs</h3>
  <p class="text-muted">Latest system actions</p>

  <div class="table-responsive">
    <table class="table table-striped table-sm">
      <thead>
        <tr>
          <th>User</th>
          <th>Account</th>
          <th>Action</th>
          <th>Description</th>
          <th>IP</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
        {% for l in logs %}
          <tr>
            <td>{{ l[0] }}</td>
            <td>{{ l[1] }}</td>
            <td><b>{{ l[2] }}</b></td>
            <td>{{ l[3] }}</td>
            <td>{{ l[4] }}</td>
            <td>{{ l[5] }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
